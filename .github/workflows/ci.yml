name: "React-ci-cd-pipeline/workflow"

on:
  push:
    branches:
        - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
        - name: "Set up Node.js"
          uses: actions/setup-node@v4
          with:
            node-version: "21"
        
        - name: "check node version"
          run: node --version
        
        - name: "clone repository"
          uses: actions/checkout@v3